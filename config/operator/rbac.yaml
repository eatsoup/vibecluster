apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: vibecluster-operator
  labels:
    app.kubernetes.io/name: vibecluster-operator
    app.kubernetes.io/component: operator
rules:
  # VirtualCluster CRD management
  - apiGroups: ["vibecluster.dev"]
    resources: ["virtualclusters"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["vibecluster.dev"]
    resources: ["virtualclusters/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["vibecluster.dev"]
    resources: ["virtualclusters/finalizers"]
    verbs: ["update"]

  # Namespace management
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]

  # Service account management
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]

  # Service management
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]

  # Secret management (for kubeconfig secrets)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]

  # ResourceQuota / LimitRange management — used to enforce spec.resources
  # on the per-vcluster namespace.
  - apiGroups: [""]
    resources: ["resourcequotas"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["limitranges"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # StatefulSet management
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]

  # Ingress management (for `expose` of type Ingress)
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # RBAC management (operator creates roles for vcluster syncers).
  # `bind` and `escalate` are required because the per-vcluster Role grants
  # `*` on `*` — a superset of every permission in the cluster — and
  # Kubernetes blocks granting permissions you don't yourself hold unless
  # you have escalate/bind on the target.
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles", "clusterrolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "delete", "bind", "escalate"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "delete", "bind", "escalate"]

  # Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]

  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # The following rules mirror the per-vcluster syncer ClusterRole. Without
  # this mirror, the operator cannot create the per-vcluster ClusterRole
  # (Kubernetes blocks privilege escalation: a subject cannot grant
  # permissions it does not itself hold). Keep in sync with
  # k8s.SyncerClusterRoleRules in pkg/k8s/builders.go.
  - apiGroups: [""]
    resources: ["pods", "pods/status", "pods/log", "pods/exec", "pods/attach", "pods/portforward"]
    verbs: ["*"]
  - apiGroups: [""]
    resources: ["services", "endpoints", "configmaps", "secrets", "serviceaccounts"]
    verbs: ["*"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch", "update"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["*"]
  - apiGroups: [""]
    resources: ["nodes", "nodes/status", "nodes/metrics", "nodes/proxy"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["statefulsets", "deployments", "replicasets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["*"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses", "csinodes", "csidrivers"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vibecluster-operator
  labels:
    app.kubernetes.io/name: vibecluster-operator
    app.kubernetes.io/component: operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vibecluster-operator
subjects:
  - kind: ServiceAccount
    name: vibecluster-operator
    namespace: vibecluster-system
