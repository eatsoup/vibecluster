apiVersion: v1
kind: Namespace
metadata:
  name: vibecluster-system
  labels:
    app.kubernetes.io/managed-by: vibecluster
    app.kubernetes.io/component: operator
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vibecluster-operator
  namespace: vibecluster-system
  labels:
    app.kubernetes.io/name: vibecluster-operator
    app.kubernetes.io/component: operator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vibecluster-operator
  namespace: vibecluster-system
  labels:
    app.kubernetes.io/name: vibecluster-operator
    app.kubernetes.io/component: operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vibecluster-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vibecluster-operator
        app.kubernetes.io/component: operator
    spec:
      serviceAccountName: vibecluster-operator
      terminationGracePeriodSeconds: 10
      containers:
        - name: operator
          image: ghcr.io/eatsoup/vibecluster/operator:latest
          args:
            - --leader-elect
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
      securityContext:
        runAsNonRoot: true
