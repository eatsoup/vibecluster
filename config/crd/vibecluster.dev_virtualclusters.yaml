apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: virtualclusters.vibecluster.dev
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
spec:
  group: vibecluster.dev
  names:
    kind: VirtualCluster
    listKind: VirtualClusterList
    plural: virtualclusters
    singular: virtualcluster
    shortNames:
      - vc
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Ready
          type: boolean
          jsonPath: .status.ready
        - name: Namespace
          type: string
          jsonPath: .status.namespace
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          description: VirtualCluster is a lightweight virtual Kubernetes cluster running inside the host cluster.
          type: object
          properties:
            apiVersion:
              description: 'APIVersion defines the versioned schema of this representation of an object.'
              type: string
            kind:
              description: 'Kind is a string value representing the REST resource this object represents.'
              type: string
            metadata:
              type: object
            spec:
              description: VirtualClusterSpec defines the desired state of a VirtualCluster.
              type: object
              properties:
                k3sImage:
                  description: K3sImage is the k3s container image to use.
                  type: string
                  default: "rancher/k3s:v1.28.5-k3s1"
                syncerImage:
                  description: SyncerImage is the syncer container image to use.
                  type: string
                  default: "ghcr.io/eatsoup/vibecluster/syncer:latest"
                storage:
                  description: Storage is the size of the persistent volume for k3s data.
                  type: string
                  default: "5Gi"
                  pattern: "^[0-9]+(Ki|Mi|Gi|Ti|Pi|Ei)?$"
                expose:
                  description: Expose configures how the virtual cluster's API server is exposed outside the host cluster.
                  type: object
                  required:
                    - type
                  properties:
                    type:
                      description: Type is the exposure strategy.
                      type: string
                      enum:
                        - LoadBalancer
                        - Ingress
                    host:
                      description: Host is the external hostname. Required for type Ingress; also added to the k3s server certificate's TLS-SAN list.
                      type: string
                    ingressClass:
                      description: IngressClass is the IngressClassName to use when type is Ingress.
                      type: string
                vnode:
                  description: VNode enables nested data-plane mode. A privileged k3s-agent pod joins the virtual API server and runs real flannel, kube-router, and klipper-lb so NetworkPolicy and in-vcluster LoadBalancer Services are enforced by real controllers. Requires privileged pods on the host.
                  type: boolean
                  default: false
                nodes:
                  description: Nodes is the number of virtual worker nodes (vnode agent pods) to run. Only meaningful when vnode is true — in non-vnode mode there is no real kubelet to scale. Each extra node is a privileged pod costing ~200m CPU / 512Mi–2Gi memory.
                  type: integer
                  format: int32
                  minimum: 1
                  default: 1
                resources:
                  description: Resources caps the total resources the virtual cluster can consume on the host. The k3s control plane's own usage counts against these caps.
                  type: object
                  properties:
                    cpu:
                      description: CPU is the total CPU budget (e.g. "4", "500m"). Enforced as both requests.cpu and limits.cpu.
                      type: string
                    memory:
                      description: Memory is the total memory budget (e.g. "8Gi"). Enforced as both requests.memory and limits.memory.
                      type: string
                    storage:
                      description: Storage is the total persistent storage budget across all PVCs (e.g. "50Gi"). Enforced as requests.storage.
                      type: string
                    pods:
                      description: Pods caps the maximum number of pods that can run in the namespace.
                      type: integer
                      format: int32
                      minimum: 0
            status:
              description: VirtualClusterStatus defines the observed state of a VirtualCluster.
              type: object
              properties:
                phase:
                  description: Phase is the current lifecycle phase of the virtual cluster.
                  type: string
                  enum:
                    - Pending
                    - Running
                    - Failed
                    - Deleting
                ready:
                  description: Ready indicates whether the virtual cluster is fully operational.
                  type: boolean
                message:
                  description: Message provides human-readable information about the current state.
                  type: string
                namespace:
                  description: Namespace is the host namespace where the virtual cluster resources are deployed.
                  type: string
                observedGeneration:
                  description: ObservedGeneration is the most recent generation observed by the controller.
                  type: integer
                  format: int64
