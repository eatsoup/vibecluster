name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release-binaries:
    name: Release CLI Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          BINARY=vibecluster-${{ matrix.goos }}-${{ matrix.goarch }}
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o "${BINARY}" ./cmd/vibecluster/
          sha256sum "${BINARY}" > "${BINARY}.sha256"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            vibecluster-${{ matrix.goos }}-${{ matrix.goarch }}
            vibecluster-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

  release-syncer-image:
    name: Release Syncer Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.syncer
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/eatsoup/vibecluster/syncer:${{ steps.version.outputs.tag }}
            ghcr.io/eatsoup/vibecluster/syncer:latest
          labels: |
            org.opencontainers.image.source=https://github.com/eatsoup/vibecluster
            org.opencontainers.image.version=${{ steps.version.outputs.tag }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.operator
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/eatsoup/vibecluster/operator:${{ steps.version.outputs.tag }}
            ghcr.io/eatsoup/vibecluster/operator:latest
          labels: |
            org.opencontainers.image.source=https://github.com/eatsoup/vibecluster
            org.opencontainers.image.version=${{ steps.version.outputs.tag }}
